name: Release (signed images + SBOM)

# Builds the Conduit images, publishes them to GitHub Container Registry, generates
# an SBOM, signs the images with Sigstore cosign (keyless / OIDC), and attaches the
# SBOM as a signed attestation. This is the supply-chain provenance a regulated
# security review asks for: verifiable, signed artifacts + a dependency inventory.
#
# Trigger:
#   - automatically on a tag matching `v*` (the supported release path), or
#   - manually via workflow_dispatch (e.g. to re-publish from `master` without
#     a new tag — produces only the :latest + :<sha> tags, no :v* tag).

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

# Prevent a double-run if the same tag is pushed twice in quick succession, or if
# someone clicks workflow_dispatch twice. Only the latest run for a given ref
# completes; older queued runs are cancelled.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write   # push to GHCR
  id-token: write   # cosign keyless signing (OIDC)

env:
  REGISTRY: ghcr.io

jobs:
  release:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - name: gateway
            dockerfile: Dockerfile.gateway
          - name: control-plane
            dockerfile: Dockerfile.control-plane
    steps:
      - uses: actions/checkout@v4

      - name: Set image name + short sha + tag set
        run: |
          echo "IMAGE=${REGISTRY}/${GITHUB_REPOSITORY,,}-${{ matrix.name }}" >> "$GITHUB_ENV"
          echo "SHORT_SHA=${GITHUB_SHA:0:7}" >> "$GITHUB_ENV"
          # On a v* tag push, add the version tag (e.g. :v0.1.0 and :0.1.0).
          # On workflow_dispatch from a branch, only :latest + :<short-sha> apply.
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF_NAME}"          # e.g. v0.1.0
            VERSION_BARE="${VERSION#v}"           # e.g. 0.1.0
            {
              echo "TAGS<<EOF"
              echo "${REGISTRY}/${GITHUB_REPOSITORY,,}-${{ matrix.name }}:latest"
              echo "${REGISTRY}/${GITHUB_REPOSITORY,,}-${{ matrix.name }}:${VERSION}"
              echo "${REGISTRY}/${GITHUB_REPOSITORY,,}-${{ matrix.name }}:${VERSION_BARE}"
              echo "${REGISTRY}/${GITHUB_REPOSITORY,,}-${{ matrix.name }}:${GITHUB_SHA:0:7}"
              echo "EOF"
            } >> "$GITHUB_ENV"
          else
            {
              echo "TAGS<<EOF"
              echo "${REGISTRY}/${GITHUB_REPOSITORY,,}-${{ matrix.name }}:latest"
              echo "${REGISTRY}/${GITHUB_REPOSITORY,,}-${{ matrix.name }}:${GITHUB_SHA:0:7}"
              echo "EOF"
            } >> "$GITHUB_ENV"
          fi

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push (by digest)
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ env.TAGS }}

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign the image (keyless)
        run: cosign sign --yes "${IMAGE}@${DIGEST}"
        env:
          IMAGE: ${{ env.IMAGE }}
          DIGEST: ${{ steps.build.outputs.digest }}

      - name: Generate SBOM (CycloneDX)
        uses: anchore/sbom-action@v0
        with:
          image: ${{ env.IMAGE }}:${{ env.SHORT_SHA }}
          format: cyclonedx-json
          output-file: sbom-${{ matrix.name }}.cyclonedx.json

      - name: Attach SBOM as a signed attestation
        run: cosign attest --yes --predicate "sbom-${{ matrix.name }}.cyclonedx.json" --type cyclonedx "${IMAGE}@${DIGEST}"
        env:
          IMAGE: ${{ env.IMAGE }}
          DIGEST: ${{ steps.build.outputs.digest }}

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom-${{ matrix.name }}
          path: sbom-${{ matrix.name }}.cyclonedx.json
