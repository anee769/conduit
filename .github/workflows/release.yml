name: Release (signed images + SBOM)

# Builds the Conduit images, publishes them to GitHub Container Registry, generates
# an SBOM, signs the images with Sigstore cosign (keyless / OIDC), and attaches the
# SBOM as a signed attestation. This is the supply-chain provenance a regulated
# security review asks for: verifiable, signed artifacts + a dependency inventory.
#
# Triggered MANUALLY for now (workflow_dispatch) so it never red-Xs master before
# the registry/permissions are set up. To make it run on tagged releases later,
# uncomment the `push: tags` trigger.

on:
  workflow_dispatch:
  # push:
  #   tags: ["v*"]

permissions:
  contents: read
  packages: write   # push to GHCR
  id-token: write   # cosign keyless signing (OIDC)

env:
  REGISTRY: ghcr.io

jobs:
  release:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - name: gateway
            dockerfile: Dockerfile.gateway
          - name: control-plane
            dockerfile: Dockerfile.control-plane
    steps:
      - uses: actions/checkout@v4

      - name: Set lowercase image name
        run: echo "IMAGE=${REGISTRY}/${GITHUB_REPOSITORY,,}-${{ matrix.name }}" >> "$GITHUB_ENV"

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push (by digest)
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign the image (keyless)
        run: cosign sign --yes "${IMAGE}@${DIGEST}"
        env:
          IMAGE: ${{ env.IMAGE }}
          DIGEST: ${{ steps.build.outputs.digest }}

      - name: Generate SBOM (CycloneDX)
        uses: anchore/sbom-action@v0
        with:
          image: ${{ env.IMAGE }}:${{ github.sha }}
          format: cyclonedx-json
          output-file: sbom-${{ matrix.name }}.cyclonedx.json

      - name: Attach SBOM as a signed attestation
        run: cosign attest --yes --predicate "sbom-${{ matrix.name }}.cyclonedx.json" --type cyclonedx "${IMAGE}@${DIGEST}"
        env:
          IMAGE: ${{ env.IMAGE }}
          DIGEST: ${{ steps.build.outputs.digest }}

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom-${{ matrix.name }}
          path: sbom-${{ matrix.name }}.cyclonedx.json
