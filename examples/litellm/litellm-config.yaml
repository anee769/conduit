# Sample LiteLLM proxy config — mounted into the litellm sidecar at
# /app/config.yaml by docker-compose.litellm.yml.
#
# Documents the minimum setup needed so Conduit can sit in front of LiteLLM:
#   - declare a few model aliases LiteLLM will accept,
#   - set a master_key that Conduit uses to talk to LiteLLM,
#   - keep drop_params on so OpenAI-shape requests for Anthropic models work.
#
# Edit the model_list to match what your team actually uses. Provider API keys
# come from .env (ANTHROPIC_API_KEY / OPENAI_API_KEY); LiteLLM resolves
# `os.environ/X` at startup.

model_list:
  - model_name: claude-sonnet-4
    litellm_params:
      model: anthropic/claude-sonnet-4
      api_key: os.environ/ANTHROPIC_API_KEY

  - model_name: claude-opus-4
    litellm_params:
      model: anthropic/claude-opus-4
      api_key: os.environ/ANTHROPIC_API_KEY

  - model_name: claude-haiku-4
    litellm_params:
      model: anthropic/claude-haiku-4
      api_key: os.environ/ANTHROPIC_API_KEY

  - model_name: gpt-4o
    litellm_params:
      model: openai/gpt-4o
      api_key: os.environ/OPENAI_API_KEY

  - model_name: gpt-4o-mini
    litellm_params:
      model: openai/gpt-4o-mini
      api_key: os.environ/OPENAI_API_KEY

litellm_settings:
  # OpenAI-shape requests for Anthropic models can include params Anthropic
  # doesn't support (logprobs, n>1, etc). Drop them at the LiteLLM layer so
  # the underlying call doesn't 400.
  drop_params: true

general_settings:
  # Shared secret Conduit sends as `authorization: Bearer ...` when forwarding.
  # LiteLLM validates it against this string. Override per-environment via the
  # LITELLM_MASTER_KEY env var (see docker-compose.litellm.yml).
  master_key: os.environ/LITELLM_MASTER_KEY
  # LiteLLM's proxy requires a DB even for the simplest master_key flow.
  # docker-compose.litellm.yml points DATABASE_URL at Conduit's Postgres
  # (a separate `litellm` schema) so no new service to manage.
  database_url: os.environ/DATABASE_URL
